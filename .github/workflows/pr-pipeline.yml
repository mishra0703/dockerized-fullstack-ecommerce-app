name: PR Pipeline

on:
    pull_request: 
        branches: [main]
        types: 
            - opened
            - synchronize


jobs:
    build_and_test:
        uses: ./.github/workflows/reusable-build-test.yml
        with:
            node_version: 20
            run_tests: true
        

    pr_comment:
        runs-on: ubuntu-latest
        needs: [build_and_test]
        steps:
            - name: Prints PR Summary
              run: echo "PR checks passed for branch - ${{ github.head_ref }}"